name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7
    - uses: actions/setup-node@v6
      with:
        cache: npm
    - name: NPM install
      run: npm ci
    - name: Build
      run: npm run build
    - name: Test
      run: xvfb-run --auto-servernum npm test

    - name: Upload coverage reports
      uses: actions/upload-artifact@v7
      with:
        name: coverage-reports
        path: |
          coverage/chrome/lcov.info
          coverage/firefox/lcov.info

  sonar:
    runs-on: ubuntu-latest
    needs: [build-and-test]
    if: ${{ github.event.pull_request.head.repo.fork != true && github.actor != 'dependabot[bot]' }}

    steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 0

    - uses: actions/setup-node@v6
      with:
        cache: npm

    - name: Download coverage reports
      uses: actions/download-artifact@v8
      with:
        name: coverage-reports
        path: coverage

    - name: Read package version
      id: package-version
      uses: martinbeentjes/npm-get-version-action@v1.3.1

    - name: Set version
      run: echo -e "\nsonar.projectVersion=${{ steps.package-version.outputs.current-version}}" >> sonar-project.properties

    - name: SonarCloud Scan
      uses: SonarSource/sonarqube-scan-action@v8
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
